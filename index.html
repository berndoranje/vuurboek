<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3A2114">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="pitkeeper">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='0' y2='1'><stop offset='0' stop-color='%23FFD34D'/><stop offset='1' stop-color='%23FF9210'/></linearGradient><radialGradient id='r' cx='50%25' cy='125%25' r='80%25'><stop offset='0' stop-color='%23FF9210' stop-opacity='.28'/><stop offset='.7' stop-color='%23FF9210' stop-opacity='0'/></radialGradient></defs><rect x='.5' y='.5' width='63' height='63' rx='14.5' fill='%231B1917' stroke='%2335312C'/><rect x='.5' y='.5' width='63' height='63' rx='14.5' fill='url(%23r)'/><g transform='translate(14,14) scale(0.5625)'><rect x='12' y='26' width='10' height='26' rx='5' fill='url(%23g)'/><rect x='27' y='10' width='10' height='42' rx='5' fill='url(%23g)'/><rect x='42' y='20' width='10' height='32' rx='5' fill='url(%23g)'/></g></svg>">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<title>pitkeeper — BBQ receptenlogboek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{overscroll-behavior:none;color-scheme:dark;
  /* Pitkeeper huisstijl v1.0 — "de Gloedmeter" (design handoff, juli 2026) */
  --surface:#121110;--sc-low:#1B1917;--sc:#1B1917;--sc-high:#35312C;
  --on:#F2EFE9;--on-var:#A39D93;--dim:#6E685F;--outline:#47433C;--outline-var:#2C2925;
  --ember:#FF9210;--gloed:#FFD34D;--deep:#A63D22;--on-accent:#171310;--error:#C9603F;
  --topbar:#3A2114;
  --grad:linear-gradient(160deg,#FFD34D,#FF9210);
  --mono:'IBM Plex Mono',monospace;
  --chev:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%23A39D93' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background:var(--surface);color:var(--on);
  font-family:'Space Grotesk',system-ui,sans-serif;
  min-height:100vh;-webkit-font-smoothing:antialiased;}
/* ---- light mode: zelfde huisstijl, lichte tinten (schakelbaar via Instellingen ▸ Weergave) ---- */
body.light{color-scheme:light;
  --surface:#F6F3ED;--sc-low:#FFFFFF;--sc:#FFFFFF;--sc-high:#ECE6DA;
  --on:#26221D;--on-var:#6B655B;--dim:#8B8474;--outline:#C8C1B2;--outline-var:#E2DBCE;
  --ember:#C96E00;--gloed:#A85A00;--deep:#A63D22;--error:#B4482A;
  --topbar:#EBD3B0;
  --chev:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%236B655B' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");}
svg{display:block;}
::selection{background:var(--ember);color:var(--on-accent);}
.vb-main{max-width:600px;margin:0 auto;padding:2px 16px 40px;}
.vb-main.tabbed{padding-bottom:150px;}

/* ---- topbar (§8.1) ---- */
.vb-top{position:sticky;top:0;z-index:10;background:var(--topbar);border-bottom:1px solid var(--outline-var);}
.vb-top-inner{max-width:600px;margin:0 auto;height:62px;display:flex;align-items:center;gap:8px;padding:0 16px;}
.vb-logo{width:26px;height:26px;margin-right:2px;flex:none;}
.vb-brand{flex:1;min-width:0;display:flex;flex-direction:column;line-height:1.1;}
.vb-brand-name{font-size:18px;font-weight:700;letter-spacing:-0.02em;color:var(--on);}
.vb-brand-sub{font-family:var(--mono);font-size:8.5px;font-weight:400;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);margin-top:2px;}
.vb-icon-btn{display:grid;place-items:center;width:34px;height:34px;border:1px solid var(--outline-var);background:var(--sc);color:var(--on-var);border-radius:17px;cursor:pointer;flex:none;padding:0;}
.vb-icon-btn:hover{background:var(--sc-high);}
/* ---- sub-scherm appbar (§16) ---- */
.vb-subbar{max-width:600px;margin:0 auto;height:62px;display:flex;align-items:center;gap:10px;padding:0 16px;font-size:19px;font-weight:700;letter-spacing:-0.02em;}
.vb-subbar .vb-icon-btn{color:var(--on);}

.vb-icon-btn:focus-visible,.vb-card:focus-visible,.vb-seg-btn:focus-visible,.vb-tab:focus-visible,.vb-fab:focus-visible,
input:focus-visible,textarea:focus-visible,select:focus-visible,.vb-btn:focus-visible,.vb-chip:focus-visible{outline:2px solid var(--ember);outline-offset:2px;}
.vb-muted{color:var(--on-var);}.vb-center{text-align:center;padding:40px 0;font-size:13px;}

/* ---- navigatiebalk (§8.6): vast aan de onderkant, volle breedte, labels-only ---- */
.vb-tabs{position:fixed;bottom:0;left:0;right:0;z-index:10;background:var(--sc);border-top:1px solid var(--outline-var);padding:8px 16px calc(8px + env(safe-area-inset-bottom));}
.vb-tabs-inner{max-width:600px;margin:0 auto;display:flex;gap:4px;}
.vb-tab{flex:1;border:none;background:none;padding:10px 0;border-radius:14px;color:var(--on-var);cursor:pointer;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;text-align:center;}
.vb-tab.on{background:var(--ember);color:var(--on-accent);font-weight:600;}

/* ---- FAB (§8.5) ---- */
.vb-fab{position:fixed;z-index:11;width:52px;height:52px;border-radius:16px;border:none;display:flex;align-items:center;justify-content:center;background:var(--grad);color:var(--on-accent);cursor:pointer;box-shadow:0 10px 24px -8px rgba(255,146,16,.4);right:max(18px,calc(50% - 282px));bottom:calc(66px + env(safe-area-inset-bottom));}
.vb-fab:hover{filter:brightness(1.08);}

/* ---- zoekrij (§8.2) ---- */
.vb-searchrow{display:flex;gap:9px;margin:12px 0 9px;}
.vb-search{flex:1;min-width:0;height:44px;display:flex;align-items:center;gap:10px;padding:0 16px;background:var(--sc);border:1px solid var(--outline-var);border-radius:22px;color:var(--dim);}
.vb-search input{flex:1;min-width:0;border:none;background:none;font-family:inherit;font-size:14px;color:var(--on);outline:none;caret-color:var(--ember);}
.vb-search input::placeholder{color:var(--dim);opacity:1;}
.vb-clear{border:none;background:none;color:var(--on-var);cursor:pointer;display:grid;place-items:center;padding:0;}
.vb-filterbtn{width:44px;height:44px;flex:none;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3.5px;background:var(--sc);border:1px solid var(--outline-var);cursor:pointer;padding:0;}
.vb-filterbtn i{display:block;height:2px;border-radius:1px;background:var(--on-var);}
.vb-filterbtn i:nth-of-type(1){width:16px;}
.vb-filterbtn i:nth-of-type(2){width:11px;}
.vb-filterbtn i:nth-of-type(3){width:6px;}
.vb-filterbtn.on{background:var(--ember);border-color:var(--ember);}
.vb-filterbtn.on i{background:var(--on-accent);}
/* samenvatting actieve filters + teller onder de zoekrij */
.vb-filterline{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 2px 9px;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}
.vb-filterline b{font-weight:500;color:var(--gloed);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vb-filterline span{white-space:nowrap;flex:none;}

/* ---- chips (§17) ---- */
.vb-chips{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 12px;}
.vb-chip{height:32px;display:inline-flex;align-items:center;gap:6px;padding:0 13px;border-radius:8px;border:1px solid var(--outline-var);background:var(--sc);color:var(--on-var);font-family:var(--mono);font-size:11.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;white-space:nowrap;}
.vb-chip.on{background:var(--ember);border-color:var(--ember);color:var(--on-accent);font-weight:600;}

/* ---- temperatuur-legenda (§8.3) ---- */
.vb-legend{display:flex;align-items:center;gap:8px;margin:0 2px 12px;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}
.vb-legend-bar{height:6px;flex:1;border-radius:3px;background:linear-gradient(90deg,#FFD34D,#FF9210,#A63D22);}

/* ---- banner / statuskaart ---- */
.vb-banner{background:var(--sc);border:1px solid var(--outline-var);color:var(--on);border-radius:12px;padding:12px 14px;font-size:12.5px;line-height:1.5;margin:12px 0 16px;}
.vb-banner b{font-weight:600;}

/* ---- lege staat (§17) ---- */
.vb-empty{text-align:center;padding:40px 16px 32px;}
.vb-empty-flame{display:grid;place-items:center;width:64px;height:64px;margin:0 auto 16px;border-radius:32px;background:var(--sc);border:1px solid var(--outline-var);color:var(--on-var);}
.vb-empty h2{font-size:17px;font-weight:700;letter-spacing:-0.02em;margin:0 0 6px;color:var(--on);}
.vb-empty p{color:var(--on-var);font-size:12.5px;margin:0 auto 18px;max-width:260px;line-height:1.5;}

/* ---- cook-kaart (§8.4) ---- */
.vb-cards{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px;}
.vb-card{position:relative;width:100%;display:block;text-align:left;background:var(--sc);border:1px solid var(--outline-var);border-radius:13px;overflow:hidden;cursor:pointer;padding:0;color:var(--on);font-family:inherit;}
.vb-card:hover{background:var(--sc-high);}
.vb-card-heat{position:absolute;left:0;top:0;bottom:0;width:4px;}
.vb-card-body{padding:10px 13px 9px 17px;}
.vb-card-head{display:flex;align-items:flex-start;gap:10px;}
.vb-card-txt{flex:1;min-width:0;}
.vb-card-head h3{font-size:13.5px;font-weight:600;line-height:1.2;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vb-card-meat{color:var(--on-var);font-size:11px;margin:2px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* kooltjes-beoordeling: gevuld = Ember(-gradiënt), leeg = As */
.vb-rate{display:flex;align-items:center;gap:3.5px;flex:none;padding-top:3px;}
.vb-rate.lg{gap:7px;padding-top:0;}
.vb-dot{display:block;flex:none;border:none;padding:0;border-radius:50%;background:var(--outline-var);}
.vb-dot.on{background:var(--ember);}
.vb-rate.lg .vb-dot.on{background:var(--grad);}
.vb-rate-card{display:flex;align-items:center;gap:14px;background:var(--sc);border:1px solid var(--outline-var);border-radius:13px;padding:14px 18px;margin-bottom:14px;}
.vb-rate-card .vb-field-lbl{margin:0;}
.vb-rate-val{margin-left:auto;font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--gloed);white-space:nowrap;}
.vb-div{height:1px;margin:8px 0 7px;background:var(--outline-var);}
.vb-card-stats{display:flex;font-family:var(--mono);}
.vb-stat{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:1px;}
.vb-stat-val{font-size:11.5px;font-weight:600;color:var(--gloed);white-space:nowrap;}
.vb-stat-lbl{font-size:8px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}

/* ---- rub-/side-kaart (§20) ---- */
.vb-card-rub .vb-card-body{display:flex;align-items:center;gap:12px;padding:13px 14px;}
.vb-rub-tag{display:inline-flex;align-items:center;height:22px;padding:0 8px;border-radius:7px;background:var(--outline-var);color:var(--on-var);font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;flex:none;}
.vb-rub-tag.marinade{background:var(--ember);color:var(--on-accent);font-weight:600;}
.vb-rub-tag.big{height:26px;padding:0 11px;font-size:11px;}

/* ---- formuliercomponenten (§14) ---- */
.vb-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.vb-field-lbl{font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-left:2px;}
.vb-req{color:var(--ember);font-style:normal;margin-left:3px;}
.vb-field input,.vb-field textarea,.vb-field select{font-family:inherit;font-size:15px;color:var(--on);background:var(--sc);border:1px solid var(--outline-var);border-radius:12px;padding:13px 16px;width:100%;outline:none;-webkit-appearance:none;appearance:none;caret-color:var(--ember);}
.vb-field input:focus,.vb-field textarea:focus,.vb-field select:focus{border-color:var(--ember);}
.vb-field select{background-image:var(--chev);background-repeat:no-repeat;background-position:right 13px center;padding-right:36px;}
.vb-field input::placeholder,.vb-field textarea::placeholder{color:var(--dim);opacity:1;}
.vb-field textarea{resize:vertical;line-height:1.5;min-height:96px;}
.vb-row{display:flex;gap:12px;}.vb-row .vb-field{flex:1;min-width:0;}
.vb-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.vb-amt{display:flex;gap:8px;}
.vb-amt input{flex:1;min-width:0;font-family:inherit;font-size:15px;color:var(--on);background:var(--sc);border:1px solid var(--outline-var);border-radius:12px;padding:13px 16px;outline:none;caret-color:var(--ember);}
.vb-amt input:focus{border-color:var(--ember);}
.vb-amt select{width:92px;flex:none;font-family:inherit;font-size:15px;color:var(--on);background:var(--sc);border:1px solid var(--outline-var);border-radius:12px;padding:13px 30px 13px 14px;outline:none;-webkit-appearance:none;appearance:none;background-image:var(--chev);background-repeat:no-repeat;background-position:right 11px center;}
.vb-seg{display:flex;height:44px;border:1px solid var(--outline-var);border-radius:12px;overflow:hidden;background:var(--sc);}
.vb-seg-btn{flex:1;border:none;background:none;font-family:var(--mono);font-size:11.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--on-var);cursor:pointer;}
.vb-seg-btn.is-on{background:var(--ember);color:var(--on-accent);font-weight:600;}
.vb-heatbar{display:flex;align-items:center;gap:10px;margin:-4px 2px 14px;}
.vb-heatbar-fill{flex:1;height:8px;border-radius:4px;}
.vb-heatbar-lbl{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}
.vb-hint{display:flex;align-items:center;gap:8px;color:var(--error);font-size:12.5px;margin:2px 0 12px;}
.vb-hint.vb-soft{color:var(--on-var);}
.vb-ings,.vb-fases{display:flex;flex-direction:column;gap:8px;}
.vb-ing-row{display:flex;gap:8px;align-items:center;}
.vb-ing-row input,.vb-ing-row select{font-family:inherit;font-size:14px;background:var(--sc);border:1px solid var(--outline-var);border-radius:12px;padding:12px 12px;color:var(--on);outline:none;-webkit-appearance:none;appearance:none;caret-color:var(--ember);}
.vb-ing-row input:focus{border-color:var(--ember);}
.vb-ing-name{flex:1;min-width:0;}
.vb-ing-qty{width:56px;flex:none;text-align:right;font-family:var(--mono);}
.vb-ing-unit{width:68px;flex:none;padding-right:24px !important;background-image:var(--chev);background-repeat:no-repeat;background-position:right 8px center;}
.vb-row-del{flex:none;width:36px;height:46px;display:grid;place-items:center;border:1px solid var(--outline-var);background:var(--sc);color:var(--error);border-radius:12px;cursor:pointer;padding:0;}
.vb-add-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;background:none;border:1px dashed var(--outline);color:var(--on-var);border-radius:11px;height:44px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;width:100%;}
.vb-add-row:hover{border-color:var(--ember);color:var(--gloed);}
/* fase-editor (§14.4) */
.vb-fase{display:flex;flex-direction:column;gap:8px;background:var(--sc);border:1px solid var(--outline-var);border-radius:13px;padding:12px;}
.vb-fase-top{display:flex;align-items:center;gap:8px;}
.vb-fase-no{flex:none;width:26px;height:26px;display:grid;place-items:center;border-radius:13px;background:var(--grad);color:var(--on-accent);font-size:13px;font-weight:700;}
.vb-fase-vals{display:flex;align-items:center;gap:8px;}
.vb-fase-vals .vb-fase-temp{flex:1;min-width:0;}
.vb-fase-vals .vb-fase-time{flex:1.6;}
.vb-fase-vals .vb-fase-temp input{flex:1;width:auto;}
.vb-fase-temp{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--outline-var);border-radius:9px;padding:0 10px;flex:none;height:32px;}
.vb-fase-tag{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);white-space:nowrap;flex:none;}
.vb-fase-temp input{width:38px;border:none;background:none;font-family:var(--mono);font-size:12.5px;font-weight:600;text-align:right;padding:0;outline:none;color:var(--on);min-width:0;caret-color:var(--ember);}
.vb-fase-deg{flex:none;}
.vb-fase-deg{font-family:var(--mono);font-size:10px;color:var(--dim);}
.vb-fase-top .vb-row-del{margin-left:auto;width:32px;height:32px;border-radius:9px;}
.vb-fase-mode{display:inline-flex;height:32px;background:var(--surface);border:1px solid var(--outline-var);border-radius:9px;overflow:hidden;flex:none;}
.vb-fase-mode button{border:none;background:none;font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:0 13px;color:var(--on-var);cursor:pointer;}
.vb-fase-mode button.on{background:var(--ember);color:var(--on-accent);font-weight:600;}
.vb-fase-desc{width:100%;font-family:inherit;font-size:13px;background:var(--surface);border:1px solid var(--outline-var);border-radius:10px;height:40px;padding:0 14px;color:var(--on);outline:none;caret-color:var(--ember);}
.vb-fase-desc:focus{border-color:var(--ember);}
/* rub-preview in cook-formulier */
.vb-preview{margin:-4px 0 14px;background:var(--sc);border:1px solid var(--outline-var);border-radius:12px;padding:12px 14px;}
.vb-ing-meta{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin:0 0 6px;}
.vb-ing-note{font-size:12px;color:var(--error);margin:8px 0 0;}
.vb-ing-list-view{list-style:none;margin:0;padding:0;font-size:13px;}
.vb-ing-list-view li{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px dotted var(--outline-var);}
.vb-ing-list-view li:last-child{border-bottom:none;}
.vb-ing-amt{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--gloed);white-space:nowrap;}

/* ---- knoppen (§14.6) ---- */
.vb-btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:inherit;font-weight:600;font-size:14.5px;height:48px;padding:0 22px;border-radius:24px;border:1px solid transparent;cursor:pointer;}
.vb-btn-primary{background:var(--grad);color:var(--on-accent);}
.vb-btn-primary:hover{filter:brightness(1.08);}
.vb-btn-primary:disabled{opacity:.45;cursor:not-allowed;filter:none;}
.vb-btn-ghost{background:none;border-color:var(--outline);color:var(--on);}
.vb-btn-ghost:hover{border-color:var(--ember);color:var(--gloed);}
.vb-btn-danger{background:var(--deep);color:#F2EFE9;height:36px;border-radius:18px;font-size:12.5px;}
.vb-btn-block{width:100%;margin-bottom:10px;}
.vb-form-actions,.vb-detail-actions{display:flex;gap:12px;margin-top:22px;}
.vb-form-actions .vb-btn,.vb-detail-actions .vb-btn{flex:1;}
.vb-form-actions .vb-btn-primary,.vb-detail-actions .vb-btn-primary{flex:1.4;}

/* ---- detail (§19/§21) ---- */
.vb-detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-top:6px;}
.vb-detail-head h2{font-size:24px;font-weight:700;letter-spacing:-0.025em;line-height:1.15;margin:0;}
.vb-detail-head .vb-rate{padding-top:8px;}
.vb-detail-meat{color:var(--on-var);margin:2px 0 0;font-size:13px;}
.vb-detail-date{display:flex;align-items:center;gap:6px;color:var(--on-var);font-family:var(--mono);font-size:11px;margin:10px 0 0;}
.vb-gauges{display:flex;gap:10px;margin:14px 0 16px;}
.vb-gauge{flex:1;background:var(--sc);border:1px solid var(--outline-var);border-radius:13px;padding:12px 14px;display:flex;flex-direction:column;gap:4px;}
.vb-gauge-lbl{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}
.vb-gauge-val{font-family:var(--mono);font-weight:600;font-size:28px;line-height:1;color:var(--gloed);}
.vb-gauge-val i{font-size:13px;font-style:normal;font-weight:500;margin-left:2px;color:var(--on-var);}
.vb-gauge-sub{font-family:var(--mono);font-size:9px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-top:1px;}
.vb-block{margin:0 0 16px;}
.vb-block-title{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ember);margin:0 0 8px;}
.vb-block p{margin:0;line-height:1.55;font-size:13px;}
.vb-notes{white-space:pre-wrap;}
.vb-fase-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}
.vb-fase-list li{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--sc);border:1px solid var(--outline-var);border-radius:12px;padding:10px 12px;}
.vb-fase-list-no{flex:none;width:24px;height:24px;display:grid;place-items:center;border-radius:12px;background:var(--grad);color:var(--on-accent);font-size:12px;font-weight:700;}
.vb-fase-list-temp{font-family:var(--mono);font-size:12.5px;font-weight:600;}
.vb-fase-list-pit{font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--on-accent);border-radius:6px;padding:3px 7px;white-space:nowrap;}
.vb-fase-list-desc{color:var(--on-var);font-size:12.5px;width:100%;padding-left:32px;margin-top:-2px;}
.vb-calc{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--on-var);margin-bottom:10px;}
.vb-calc input{width:76px;font-family:var(--mono);font-size:13px;color:var(--on);background:var(--sc);border:1px solid var(--outline-var);border-radius:12px;padding:10px 12px;outline:none;text-align:right;caret-color:var(--ember);}
.vb-calc input:focus{border-color:var(--ember);}
.vb-specs{margin:0 0 6px;border-top:1px solid var(--outline-var);font-size:13px;}
.vb-spec{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--outline-var);}
.vb-spec dt{display:flex;align-items:center;gap:8px;color:var(--dim);font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;}
.vb-spec dt .vb-spec-ic{color:var(--ember);display:inline-flex;line-height:0;}
.vb-spec dd{margin:0;font-family:var(--mono);font-size:12.5px;font-weight:500;color:var(--gloed);text-align:right;}
.vb-coal{width:13px;height:13px;border-radius:3px;display:inline-block;background:linear-gradient(135deg,#4a4038,#191512);}
.vb-del-link{display:flex;align-items:center;justify-content:center;gap:7px;margin:18px auto 0;background:none;border:none;color:var(--error);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.vb-del-confirm{margin-top:18px;background:var(--sc);border:1px solid var(--deep);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.vb-del-confirm span{font-size:13px;}
.vb-del-confirm>div{display:flex;gap:8px;}
.vb-del-confirm .vb-btn{height:36px;border-radius:18px;padding:0 16px;font-size:12.5px;}

/* ---- filterpaneel / bottom sheet (§18) ---- */
.vb-scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:20;border:none;padding:0;cursor:default;width:100%;}
.vb-sheet{position:fixed;left:0;right:0;bottom:0;z-index:21;background:var(--sc);border:1px solid var(--outline-var);border-bottom:none;border-radius:24px 24px 0 0;padding:10px 16px calc(22px + env(safe-area-inset-bottom));max-width:600px;margin:0 auto;max-height:85vh;max-height:85dvh;overflow-y:auto;}
.vb-handle{width:36px;height:4px;border-radius:2px;background:var(--sc-high);margin:0 auto 14px;}
.vb-sheet h6{margin:0 0 14px;font-size:16px;font-weight:700;letter-spacing:-0.01em;color:var(--on);}
.vb-sheet .vb-field-lbl{display:block;margin:0 0 6px 2px;}
.vb-sheet-actions{display:flex;gap:12px;margin-top:16px;}
.vb-sheet-actions .vb-btn{flex:1;}
.vb-sheet-actions .vb-btn-primary{flex:1.4;}

/* ---- instellingen (§24) ---- */
.vb-set-status{background:var(--sc);border:1px solid var(--outline-var);border-radius:12px;padding:12px 14px;font-size:12.5px;line-height:1.55;color:var(--on-var);margin-bottom:16px;}
.vb-set-status b{color:var(--on);font-weight:600;}
.vb-set-note{font-size:11.5px;color:var(--on-var);opacity:.85;line-height:1.5;margin-top:14px;}
.vb-set-err{color:var(--error);}
.vb-spin svg{animation:vbspin 1s linear infinite;}
@keyframes vbspin{to{transform:rotate(360deg);}}
.vb-sync-field{display:flex;gap:8px;margin:10px 0 12px;}
.vb-sync-field input{flex:1;min-width:0;font-family:inherit;font-size:14px;color:var(--on);background:var(--sc);border:1px solid var(--outline-var);border-radius:12px;padding:12px 14px;outline:none;caret-color:var(--ember);}
.vb-sync-field input:focus{border-color:var(--ember);}
.vb-sync-field .vb-btn{height:46px;border-radius:23px;flex:none;}
.vb-h2s{font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ember);margin:24px 0 8px;}

/* ---- planner (cook-detail) ---- */
.vb-plan-lbl{width:76px;flex:none;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}
.vb-calc input[type=time]{width:118px;text-align:left;}
.vb-plan-res{margin-top:4px;}
.vb-plan-time{margin-left:auto;font-family:var(--mono);font-weight:600;font-size:12.5px;color:var(--gloed);white-space:nowrap;}
.vb-plan-ic{color:var(--ember);display:inline-flex;line-height:0;}

/* ---- statistieken ---- */
.vb-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 0 10px;}
.vb-bar-row{margin-bottom:10px;}
.vb-bar-row:last-child{margin-bottom:0;}
.vb-bar-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;font-size:12.5px;margin-bottom:4px;}
.vb-bar-top .vb-muted{font-family:var(--mono);font-size:10px;letter-spacing:.04em;white-space:nowrap;flex:none;}
.vb-bar-track{height:8px;border-radius:4px;background:var(--sc-high);}
.vb-bar-fill{height:8px;border-radius:4px;background:var(--ember);}
.vb-stat-sub{color:var(--on-var);font-size:12.5px;width:100%;}

@media (max-width:380px){.vb-gauge-val{font-size:24px;}}
</style>

function ic(name, size, fill){

/* logo "de Gloedmeter": drie kolen + vonk (huisstijl §01) */

/* ===================== opslag ===================== */
var KEY_RECEPTEN="vuurboek:recepten", KEY_RUBS="vuurboek:rubs", KEY_SIDES="vuurboek:sides", KEY_SAUZEN="vuurboek:sauzen", KEY_SYNC="vuurboek:sync", KEY_DELETED="vuurboek:deleted";
var storageOK = (function(){ try{ localStorage.setItem("__vb_t","1"); localStorage.removeItem("__vb_t"); return true; }catch(e){ return false; } })();

/* thema is een apparaat-voorkeur: lokaal bewaard, niet gesynct */
var KEY_THEME="vuurboek:theme";
var THEME=(function(){ if(!storageOK) return "dark"; try{ return localStorage.getItem(KEY_THEME)==="light"?"light":"dark"; }catch(e){ return "dark"; } })();
function applyTheme(){
  document.body.classList.toggle("light",THEME==="light");
  var m=document.querySelector('meta[name="theme-color"]'); if(m) m.setAttribute("content",THEME==="light"?"#EBD3B0":"#3A2114");
}
function setTheme(t){ THEME=t; if(storageOK){ try{ localStorage.setItem(KEY_THEME,t); }catch(e){} } applyTheme(); }

/* tombstones ouder dan 90 dagen opruimen zodat de sync-payload niet eindeloos groeit;

(function(){

  Object.keys(TOMB).forEach(function(id){ if(TOMB[id]<cutoff){ delete TOMB[id]; changed=true; } });

/* ===================== reken-helpers ===================== */
/* Pit-temperatuur kleurschaal (§9): 95→300 °C over de hittegradiënt Gloed → Ember → Diep rood */
function heatCalc(pit){
  var v=Number(pit); if(!v||isNaN(v)) return null;
  var t=Math.max(0,Math.min(1,(v-95)/(300-95)));
  var st=[[255,211,77],[255,146,16],[166,61,34]], a,b,f;
  if(t<0.5){ a=st[0]; b=st[1]; f=t/0.5; } else { a=st[1]; b=st[2]; f=(t-0.5)/0.5; }
  return [Math.round(a[0]+(b[0]-a[0])*f),Math.round(a[1]+(b[1]-a[1])*f),Math.round(a[2]+(b[2]-a[2])*f)];
}
function heatColor(pit){
  var c=heatCalc(pit); if(!c) return "var(--on-var)";
  return "rgb("+c.join(",")+")";
}
/* hitterand: bovenkant schaalt mee met de pit-temperatuur, onderkant is altijd Ember */
function heatEdge(pit){ var c=heatCalc(pit); if(!c) return "var(--outline-var)"; return "linear-gradient(180deg,"+heatColor(pit)+",#FF9210)"; }

function toGrams(val,eu){ var n=Number(val); if(!n||isNaN(n)) return 0; return eu==="kg"? n*1000 : n; }
function fmtAmount(v){ if(v==null||isNaN(v)) return ""; var r; if(v>=10) r=Math.round(v); else if(v>=1) r=Math.round(v*10)/10; else r=Math.round(v*100)/100; return r.toLocaleString("nl-NL",{maximumFractionDigits:2}); }
/* vrije tekst-duur ("12 uur", "1,5 uur", "1 uur 30 min", "12-14 uur") → minuten, of null bij onleesbare input */
function parseDuur(str){
  if(str==null) return null;
  var s=String(str).toLowerCase().replace(/,/g,".").trim();
  if(!s) return null;
  /* bereik ("12-14 uur", "12 à 14 uur") → gemiddelde van beide grenzen */
  var b=s.match(/^(\d+(?:\.\d+)?)\s*(?:-|–|à|a)\s*(\d+(?:\.\d+)?)\s*(uren|uur|u|h|minuten|min|m)\.?$/);

/* ===================== filter- & sorteerpaneel (§18) ===================== */
function filterSheet(){
  var frag=document.createDocumentFragment();
  frag.appendChild(el("button",{class:"vb-scrim","aria-label":"Sluiten",onClick:function(){ S.sheet=false; render(); }}));
  var sheet=el("div",{class:"vb-sheet",role:"dialog","aria-label":"Filteren en sorteren"});
  sheet.appendChild(el("div",{class:"vb-handle"}));
  sheet.appendChild(el("h6",{},"Filteren & sorteren"));
  /* enkelvoudige keuze (sorteren) */
  function chipRow(options, get, set){
    var bar=el("div",{class:"vb-chips"});
    function fill(){
      clear(bar);
      options.forEach(function(o){
        var on=get()===o.v;
        var b=el("button",{class:"vb-chip"+(on?" on":"")});
        if(on) b.appendChild(raw(ic("check",14)));
        b.appendChild(document.createTextNode(o.l));
        b.addEventListener("click",function(){ set(o.v); fill(); });
        bar.appendChild(b);
      });
    }
    fill(); return bar;
  }
  /* meervoudige keuze (filters) — "Alle" (v:"") wist de selectie, overige waarden togglen */
  function chipRowMulti(options, getArr, setArr){
    var bar=el("div",{class:"vb-chips"});
    function fill(){
      clear(bar);
      var arr=getArr();
      options.forEach(function(o){
        var isAll=(o.v==="");
        var on=isAll ? arr.length===0 : arr.indexOf(o.v)>-1;
        var b=el("button",{class:"vb-chip"+(on?" on":"")});
        if(on) b.appendChild(raw(ic("check",14)));
        b.appendChild(document.createTextNode(o.l));
        b.addEventListener("click",function(){
          if(isAll){ setArr([]); }
          else { var a=getArr().slice(); var idx=a.indexOf(o.v); if(idx>-1) a.splice(idx,1); else a.push(o.v); setArr(a); }
          fill();
        });
        bar.appendChild(b);
      });
    }
    fill(); return bar;
  }
  function section(label, row){ sheet.appendChild(el("span",{class:"vb-field-lbl"},label)); sheet.appendChild(row); }
  function opts(all, vals){ return [{v:"",l:"Alle"}].concat(vals.map(function(v){return {v:v,l:v};})); }
  var sortOpts=[{v:"datum",l:"Datum"},{v:"naam",l:"Naam (A–Z)"}];

  if(S.screen==="rubs"){
    var FR={type:S.fltRub.type.slice()}, sortR={v:S.sortRub};
    section("Sorteren", chipRow(sortOpts, function(){return sortR.v;}, function(v){sortR.v=v;}));
    section("Type", chipRowMulti([{v:"",l:"Alle"},{v:"Rub",l:"Rub"},{v:"Marinade",l:"Marinade"}], function(){return FR.type;}, function(a){FR.type=a;}));
    sheet.appendChild(el("div",{class:"vb-sheet-actions"},
      btn("vb-btn vb-btn-ghost",null,"Wissen",function(){ S.fltRub={type:[]}; S.sortRub="naam"; S.sheet=false; render(); }),
      btn("vb-btn vb-btn-primary",null,"Toepassen",function(){ S.fltRub=FR; S.sortRub=sortR.v; S.sheet=false; render(); })));
  } else if(SIMPLE[S.screen]){
    var cfg=SIMPLE[S.screen];
    var FS={porties:S[cfg.fltKey].porties.slice()}, sortS={v:S[cfg.sortKey]};
    section("Sorteren", chipRow(sortOpts, function(){return sortS.v;}, function(v){sortS.v=v;}));
    section("Aantal personen", chipRowMulti([{v:"",l:"Alle"},{v:"1-4",l:"1–4"},{v:"5-8",l:"5–8"},{v:"9",l:"9+"}], function(){return FS.porties;}, function(a){FS.porties=a;}));
    sheet.appendChild(el("div",{class:"vb-sheet-actions"},
      btn("vb-btn vb-btn-ghost",null,"Wissen",function(){ S[cfg.fltKey]={porties:[]}; S[cfg.sortKey]="naam"; S.sheet=false; render(); }),
      btn("vb-btn vb-btn-primary",null,"Toepassen",function(){ S[cfg.fltKey]=FS; S[cfg.sortKey]=sortS.v; S.sheet=false; render(); })));
  } else {
    var F={cat:S.flt.cat.slice(),methode:S.flt.methode.slice(),temp:S.flt.temp.slice(),houtskool:S.flt.houtskool.slice(),rookhout:S.flt.rookhout.slice()}, sortC={v:S.sortCook};
    section("Sorteren", chipRow(sortOpts, function(){return sortC.v;}, function(v){sortC.v=v;}));
    var cats=catsUsed();
    if(cats.length) section("Categorie", chipRowMulti(opts(0,cats), function(){return F.cat;}, function(a){F.cat=a;}));
    var methodes=usedValues(S.recepten,"methode");
    if(methodes.length>=2) section("Methode", chipRowMulti(opts(0,methodes), function(){return F.methode;}, function(a){F.methode=a;}));
    section("Pit-temperatuur", chipRowMulti([{v:"",l:"Alle"},{v:"low",l:"< 130°"},{v:"mid",l:"130–200°"},{v:"high",l:"> 200°"}], function(){return F.temp;}, function(a){F.temp=a;}));
    var kolen=usedValues(S.recepten,"houtskool");
    if(kolen.length) section("Kolensoort", chipRowMulti(opts(0,kolen), function(){return F.houtskool;}, function(a){F.houtskool=a;}));
    var houts=usedValuesArr(S.recepten,"rookhout");
    if(houts.length) section("Rookhout", chipRowMulti(opts(0,houts), function(){return F.rookhout;}, function(a){F.rookhout=a;}));
    sheet.appendChild(el("div",{class:"vb-sheet-actions"},
      btn("vb-btn vb-btn-ghost",null,"Wissen",function(){ S.flt={cat:[],methode:[],temp:[],houtskool:[],rookhout:[]}; S.sortCook="naam"; S.sheet=false; render(); }),
      btn("vb-btn vb-btn-primary",null,"Toepassen",function(){ S.flt=F; S.sortCook=sortC.v; S.sheet=false; render(); })));
  }
  frag.appendChild(sheet);
  return frag;
}

/* ===================== SIDES- & SAUZEN-LIJST (§23) ===================== */
function portiesInRange(p, range){
  var n=Number(p)||0;
  if(range==="1-4") return n>=1&&n<=4;
  if(range==="5-8") return n>=5&&n<=8;
  if(range==="9") return n>=9;
  return true;
}
function simpleList(cfg){

      if(f.porties.length && !f.porties.some(function(rng){return portiesInRange(r.porties,rng);})) return false;

/* terugrekenplanner: van "klaar om" terug naar aansteekmoment — vluchtig (niets opslaan/syncen),
   rekent in minuten sinds middernacht om DST-gedoe te vermijden */
function plannerBlock(r){
  var gaarMin=parseDuur(r.gaartijd), rustMin=parseDuur(r.rusttijd);
  var res=el("div");
  var klaar=el("input",{type:"time","aria-label":"Klaar om"});
  klaar.addEventListener("input",recalc);
  function duurPair(mins){
    var u=el("input",{type:"number",min:"0",value:mins==null?"":String(Math.floor(mins/60)),"aria-label":"uren"});
    var m=el("input",{type:"number",min:"0",value:mins==null?"":String(mins%60),"aria-label":"minuten"});
    u.addEventListener("input",recalc); m.addEventListener("input",recalc);
    return {u:u,m:m,
      leeg:function(){ return !String(u.value).trim() && !String(m.value).trim(); },
      min:function(){ return (Number(u.value)||0)*60+(Number(m.value)||0); }};
  }
  var gaar=duurPair(gaarMin), rust=duurPair(rustMin), stook=duurPair(30);
  function duurRij(lbl,p){ return el("div",{class:"vb-calc"}, el("span",{class:"vb-plan-lbl"},lbl), p.u, el("span",{},"u"), p.m, el("span",{},"min")); }
  function fmtKlok(min){ var mm=((min%1440)+1440)%1440, h=Math.floor(mm/60), m2=mm%60; return (h<10?"0":"")+h+":"+(m2<10?"0":"")+m2; }
  function recalc(){
    extra.hidden=!klaar.value;
    clear(res);
    if(!klaar.value || gaar.leeg() || gaar.min()<=0) return;
    var p=klaar.value.split(":"), einde=Number(p[0])*60+Number(p[1]);
    var vanBbq=einde-rust.min(), erop=vanBbq-gaar.min(), aan=erop-stook.min();
    var ol=el("ol",{class:"vb-fase-list vb-plan-res"});
    [["Aansteken",aan,1],["Vlees erop",erop],["Van de bbq",vanBbq],["Klaar",einde]].forEach(function(row){
      var li=el("li",{});
      if(row[2]) li.appendChild(el("span",{class:"vb-plan-ic"},raw(ic("flame",15,"currentColor"))));
      li.appendChild(el("span",{class:"vb-fase-list-temp"},row[0]));
      li.appendChild(el("span",{class:"vb-plan-time"}, fmtKlok(row[1])+(row[1]<0?" (dag ervoor)":"")));
      ol.appendChild(li);
    });
    res.appendChild(ol);
  }
  /* alleen "Klaar om" is zichtbaar; de overige velden verschijnen pas als dat is ingevuld */
  var extra=el("div",{hidden:true});
  if(r.gaartijd && gaarMin==null) extra.appendChild(el("p",{class:"vb-hint vb-soft"},"Gaartijd kon niet automatisch worden gelezen — vul hem hieronder in."));
  [duurRij("Gaartijd",gaar), duurRij("Rusttijd",rust), duurRij("Opstoken",stook), res].forEach(function(n){ extra.appendChild(n); });
  var body=[el("div",{class:"vb-calc"}, el("span",{class:"vb-plan-lbl"},"Klaar om"), klaar), extra];
  var title=el("span",{style:{display:"flex",alignItems:"center",gap:"6px"}}, raw(ic("clock",13)), " Planner");
  return block(title, body);
}

  }
  wrap.appendChild(block("Totalen", totBody));
  /* per categorie: aantal, gem. beoordeling en gaartijd per kg (alleen cooks met leesbare tijd én gewicht) */
  var cats=catsUsed();
  if(cats.length){
    var ul=el("ul",{class:"vb-fase-list"});
    cats.forEach(function(cat){
      var cooks=S.recepten.filter(function(x){return x.soortVlees===cat;});
      var li=el("li",{}, el("span",{class:"vb-fase-list-temp"},cat), el("span",{class:"vb-plan-time"},cooks.length+(cooks.length===1?" cook":" cooks")));
      var sub=[], gem=gemBeoordeling(cooks);
      if(gem!=null) sub.push("gem. beoordeling "+fmtGem(gem));
      var kgN=0, kgTot=0;
      cooks.forEach(function(x){ var min=parseDuur(x.gaartijd), g=toGrams(x.gewicht,x.gewichtEenheid); if(min&&g>0){ kgN++; kgTot+=min/(g/1000); } });
      if(kgN) sub.push("≈ "+fmtDuur(kgTot/kgN)+" / kg ("+kgN+(kgN===1?" cook":" cooks")+")");
      if(sub.length) li.appendChild(el("span",{class:"vb-stat-sub"},sub.join(" · ")));
      ul.appendChild(li);
    });
    wrap.appendChild(block("Per categorie", ul));
  }
  /* rookhout & houtskool: telling + gem. beoordeling van de cooks waarin gebruikt */
  function telOp(getVals){
    var map={}, order=[];
    S.recepten.forEach(function(x){ getVals(x).forEach(function(v){ v=String(v).trim(); if(!v) return; var k=v.toLowerCase(); if(!map[k]){ map[k]={label:v,cooks:[]}; order.push(k); } map[k].cooks.push(x); }); });
    return order.map(function(k){ var e=map[k]; return {label:e.label,count:e.cooks.length,gem:gemBeoordeling(e.cooks)}; })
      .sort(function(a,b){ return b.count-a.count || a.label.localeCompare(b.label); });
  }
  var hout=telOp(function(x){ return Array.isArray(x.rookhout)?x.rookhout:[]; });
  if(hout.length) wrap.appendChild(block("Rookhout", barList(hout)));
  var kolen=telOp(function(x){ return x.houtskool?[x.houtskool]:[]; });
  if(kolen.length) wrap.appendChild(block("Houtskool", barList(kolen)));
  /* rubs in de praktijk: alleen rubs die minstens één keer gekoppeld zijn */
  var rubItems=[];
  S.rubs.forEach(function(rb){
    var cooks=S.recepten.filter(function(x){return x.rubRef===rb.id;});
    if(cooks.length) rubItems.push({rub:rb,cooks:cooks});
  });
  if(rubItems.length){
    rubItems.sort(function(a,b){ return b.cooks.length-a.cooks.length || byName(a.rub,b.rub); });
    var rul=el("ul",{class:"vb-fase-list"});
    rubItems.forEach(function(it){
      var gem=gemBeoordeling(it.cooks);
      var li=el("li",{}, el("span",{class:"vb-fase-list-temp"},it.rub.naam), el("span",{class:"vb-plan-time"},it.cooks.length+(it.cooks.length===1?" cook":" cooks")));
      li.appendChild(el("span",{class:"vb-stat-sub"}, gem!=null? "gem. beoordeling "+fmtGem(gem) : "nog geen beoordeling"));
      rul.appendChild(li);
    });
    wrap.appendChild(block("Rubs in de praktijk", rul));
  }
  return wrap;
}

/* ===================== INSTELLINGEN (§24) ===================== */
function settings(){
  var wrap=el("div",{style:{paddingTop:"6px"}});
  wrap.appendChild(segmented("Weergave", THEME==="light"?"Licht":"Donker", ["Donker","Licht"], function(v){ setTheme(v==="Licht"?"light":"dark"); }));
  var statusHtml = storageOK
    ? "<b>Automatisch opslaan: aan.</b> Je cooks, rubs, bijgerechten en sauzen worden bewaard op dit apparaat. Maak af en toe een back-up met Exporteren."
    : "<b>Automatisch opslaan: uit.</b> Dit bestand draait zonder vaste opslag-locatie. Wat je invult blijft alleen tijdens deze sessie bewaard — gebruik <b>Exporteren</b> om je gegevens als bestand op te slaan, en <b>Importeren</b> om ze terug te laden.";
  wrap.appendChild(el("div",{class:"vb-set-status",html:statusHtml}));

  wrap.appendChild(btn("vb-btn vb-btn-primary vb-btn-block","download","Exporteer gegevens (back-up)",doExport));
  wrap.appendChild(btn("vb-btn vb-btn-ghost vb-btn-block","plus","Importeer: toevoegen & bijwerken",doImportMerge));
  wrap.appendChild(btn("vb-btn vb-btn-ghost vb-btn-block","upload","Importeer & vervang alles",doImport));

  wrap.appendChild(el("h3",{class:"vb-h2s"},"Synchronisatie tussen apparaten"));
  if(!SY.token){
    wrap.appendChild(el("p",{class:"vb-set-note",style:{marginTop:"0",marginBottom:"0"}},"Koppel een GitHub-token (alleen gist-rechten) om je gegevens automatisch te synchroniseren tussen je telefoon, tablet en computer. Zie het stappenplan voor het aanmaken van een token."));
    var tIn=el("input",{type:"password",placeholder:"Plak hier je GitHub-token","aria-label":"GitHub-token"});
    wrap.appendChild(el("div",{class:"vb-sync-field"}, tIn, btn("vb-btn vb-btn-primary",null,"Koppelen",function(){
      var v=tIn.value.trim(); if(!v){ alert("Plak eerst je GitHub-token."); return; }
      SY.token=v; SY.dirty=true; persistSync(); render(); syncNow(true);
    })));
  } else {
    wrap.appendChild(el("div",{class:"vb-set-status",id:"vb-sync-status",html:syncStatusHtml()}));
    wrap.appendChild(btn("vb-btn vb-btn-ghost vb-btn-block","refresh","Nu synchroniseren",function(){ syncNow(true); }));
    wrap.appendChild(el("button",{class:"vb-del-link",style:{margin:"4px auto 0"},onClick:function(){
      if(confirm("Synchronisatie ontkoppelen? Je gegevens blijven gewoon op dit apparaat staan.")){ SY.token=""; SY.gistId=""; persistSync(); render(); }
    }}, raw(ic("x",14))," Ontkoppelen"));
  }

  wrap.appendChild(el("p",{class:"vb-set-note"}, S.recepten.length+" cooks · "+S.rubs.length+" rubs/marinades · "+S.sides.length+" bijgerechten · "+S.sauzen.length+" sauzen opgeslagen."));
  wrap.appendChild(el("p",{class:"vb-set-note"},"Tip: voeg de app toe aan je startscherm (Chrome ▸ menu ▸ Toevoegen aan startscherm) zodat hij schermvullend opent."));
  return wrap;
}
function doExport(){
  var data={ app:"vuurboek", version:1, exported:new Date().toISOString(), recepten:S.recepten, rubs:S.rubs, sides:S.sides, sauzen:S.sauzen };
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a"); a.href=url; a.download="pitkeeper-backup-"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(function(){ URL.revokeObjectURL(url); },1000);
}
/* de vier collecties met hun migratie- en opslagfunctie; rubs hebben (nog) geen migratie */
var COLS=[
  {prop:"recepten", migrate:migrateRecipe, save:saveRecepten, lbl:"cooks"},
  {prop:"rubs", migrate:null, save:saveRubs, lbl:"rubs"},
  {prop:"sides", migrate:migrateSide, save:saveSides, lbl:"bijgerechten"},
  {prop:"sauzen", migrate:migrateSide, save:saveSauzen, lbl:"sauzen"}
];
function migrateCol(c, r){ return c.migrate ? c.migrate(r) : Object.assign({},r); }
/* "12 cooks, 3 rubs, 5 bijgerechten en 2 sauzen" */
function countsText(counts){
  var parts=COLS.map(function(c){ return counts[c.prop]+" "+c.lbl; });
  return parts.slice(0,-1).join(", ")+" en "+parts[parts.length-1];
}
function pickJson(onData){
  var inp=document.createElement("input"); inp.type="file"; inp.accept=".json,application/json";
  inp.addEventListener("change",function(){ var f=inp.files[0]; if(!f) return; var rd=new FileReader();
    rd.onload=function(){ try{ var data=JSON.parse(rd.result);
      var lists={}; COLS.forEach(function(c){ lists[c.prop]=Array.isArray(data[c.prop])?data[c.prop]:[]; });
      onData(lists);
    }catch(e){ alert("Kon het bestand niet lezen. Is het een Pitkeeper/Vuurboek-bestand (.json)?"); } };
    rd.readAsText(f);
  });
  inp.click();
}
function doImport(){
  pickJson(function(lists){
    var counts={}; COLS.forEach(function(c){ counts[c.prop]=lists[c.prop].length; });
    if(!confirm("Hiermee vervang je je huidige gegevens door "+countsText(counts)+" uit het bestand. Doorgaan?")) return;
    var now=Date.now(), incoming={};
    COLS.forEach(function(c){ lists[c.prop].forEach(function(r){ if(r&&r.id) incoming[r.id]=1; }); });
    COLS.forEach(function(c){ S[c.prop].forEach(function(r){ if(r.id && !incoming[r.id]) TOMB[r.id]=now; }); });
    COLS.forEach(function(c){
      S[c.prop]=lists[c.prop].map(function(r){ var m=migrateCol(c,r); if(!m.id) m.id=uid(); if(!m.updatedAt) m.updatedAt=now; return m; });
      c.save();
    });
    persistTomb(); touch();
    alert("Geïmporteerd: "+countsText(counts)+"."); render();
  });
}
function doImportMerge(){
  pickJson(function(lists){
    var total=COLS.reduce(function(n,c){ return n+lists[c.prop].length; },0);
    if(total===0){ alert("Geen cooks, rubs, bijgerechten of sauzen gevonden in dit bestand."); return; }
    var added={}, upd={};
    COLS.forEach(function(c){
      var have={}; S[c.prop].forEach(function(r){ if(r.id) have[r.id]=1; });
      added[c.prop]=0; upd[c.prop]=0;
      lists[c.prop].forEach(function(r){
        var m=migrateCol(c,r); m.updatedAt=Date.now();
        if(m.id && have[m.id]){ S[c.prop]=S[c.prop].map(function(x){return x.id===m.id?m:x;}); upd[c.prop]++; return; }
        if(!m.id) m.id=uid(); have[m.id]=1; S[c.prop].push(m); added[c.prop]++;
      });
      if(added[c.prop]||upd[c.prop]) c.save();
    });
    var totUpd=COLS.reduce(function(n,c){ return n+upd[c.prop]; },0);
    var totAdd=COLS.reduce(function(n,c){ return n+added[c.prop]; },0);
    if(totAdd||totUpd) touch();
    alert("Toegevoegd: "+countsText(added)+"."+(totUpd? " Bijgewerkt: "+countsText(upd)+".":""));
    render();
  });
}

/* ===================== sync (GitHub Gist) ===================== */
var GIST_FILE="vuurboek-data.json";
var syncTimer=null;
function scheduleSync(){ if(!SY.token) return; if(syncTimer) clearTimeout(syncTimer); syncTimer=setTimeout(function(){ syncTimer=null; syncNow(); },3000); }
function touch(){ SY.dirty=true; persistSync(); scheduleSync(); }
function gh(method, path, body){
  return fetch("https://api.github.com"+path,{method:method,headers:{"Authorization":"Bearer "+SY.token,"Accept":"application/vnd.github+json"},body:body?JSON.stringify(body):undefined})
    .then(function(res){
      if(res.status===401||res.status===403) throw new Error("token geweigerd of verlopen");
      if(res.status===404) throw new Error("gist niet gevonden");
      if(!res.ok) throw new Error("GitHub-fout "+res.status);
      return res.json();
    });
}
function syncPayload(){ return JSON.stringify({app:"vuurboek",version:4,updated:new Date().toISOString(),recepten:S.recepten,rubs:S.rubs,sides:S.sides,sauzen:S.sauzen,deleted:TOMB},null,1); }
/* doorzoekt alle gist-pagina's, anders wordt bij >100 gists een dubbele data-gist aangemaakt */
function findGist(page){
  return gh("GET","/gists?per_page=100&page="+page).then(function(list){
    list=list||[];
    var found=list.filter(function(g){ return g.files && g.files[GIST_FILE]; })[0];
    if(found) return found;
    if(list.length<100) return null;
    return findGist(page+1);
  });
}
function ensureGist(){
  if(SY.gistId) return Promise.resolve();
  return findGist(1).then(function(found){
    if(found){ SY.gistId=found.id; persistSync(); return; }
    var files={}; files[GIST_FILE]={content:syncPayload()};
    return gh("POST","/gists",{description:"Pitkeeper — BBQ receptenlogboek (data)",public:false,files:files}).then(function(g){ SY.gistId=g.id; persistSync(); });
  });
}
function pullRemote(){
  return gh("GET","/gists/"+SY.gistId).then(function(g){
    var f=g.files && g.files[GIST_FILE]; if(!f) return null;
    if(f.truncated) return fetch(f.raw_url).then(function(r){ return r.json(); });
    try{ return JSON.parse(f.content); }catch(e){ return null; }
  });
}
function mergeTombs(remote){ if(!remote) return; Object.keys(remote).forEach(function(id){ if(!TOMB[id]||remote[id]>TOMB[id]) TOMB[id]=remote[id]; }); }
function mergeLists(local, remote){
  var map={};
  function put(it){ if(!it||!it.id) return; var ex=map[it.id]; if(!ex||(it.updatedAt||0)>(ex.updatedAt||0)) map[it.id]=it; }
  local.forEach(put); (remote||[]).forEach(put);
  return Object.keys(map).map(function(id){ return map[id]; }).filter(function(it){ return !(TOMB[it.id] && TOMB[it.id]>=(it.updatedAt||0)); });
}
function syncNow(manual){
  if(!SY.token) return;
  if(!navigator.onLine){ if(manual) alert("Geen internetverbinding — synchroniseren lukt zodra je weer online bent."); return; }
  if(SY.busy){ SY.queued=true; return; }
  SY.busy=true; SY.error=""; updateSyncUI();
  var before=JSON.stringify([S.recepten,S.rubs,S.sides,S.sauzen]), remoteStr="";
  ensureGist().then(pullRemote).then(function(remote){
    if(remote){
      remoteStr=JSON.stringify({r:remote.recepten||[],b:remote.rubs||[],s:remote.sides||[],sa:remote.sauzen||[],d:remote.deleted||{}});
      mergeTombs(remote.deleted);
      S.recepten=mergeLists(S.recepten,(remote.recepten||[]).map(migrateRecipe)).sort(byDateDesc);
      S.rubs=mergeLists(S.rubs,remote.rubs||[]).sort(byName);
      S.sides=mergeLists(S.sides,(remote.sides||[]).map(migrateSide)).sort(byName);
      S.sauzen=mergeLists(S.sauzen,(remote.sauzen||[]).map(migrateSide)).sort(byName);
      persist(KEY_RECEPTEN,S.recepten); persist(KEY_RUBS,S.rubs); persist(KEY_SIDES,S.sides); persist(KEY_SAUZEN,S.sauzen); persistTomb();
    }
    if(SY.dirty || JSON.stringify({r:S.recepten,b:S.rubs,s:S.sides,sa:S.sauzen,d:TOMB})!==remoteStr){
      var files={}; files[GIST_FILE]={content:syncPayload()};
      return gh("PATCH","/gists/"+SY.gistId,{files:files});
    }
  }).then(function(){ SY.dirty=false; SY.lastSync=Date.now(); })
  .catch(function(e){ SY.error=(e&&e.message)?e.message:"onbekende fout"; })
  .then(function(){
    SY.busy=false; persistSync();
    if(SY.queued){ SY.queued=false; updateSyncUI(); syncNow(); return; }
    var changed=JSON.stringify([S.recepten,S.rubs,S.sides,S.sauzen])!==before;
    /* render(true): scrollpositie behouden — dit is een verversing op de achtergrond, geen navigatie */
    if(changed && ["cooks","rubs","sides","sauzen","cook-detail","rub-detail","side-detail","sauce-detail","settings","stats"].indexOf(S.screen)>-1) render(true);
    else updateSyncUI();
  });
}
function syncStatusHtml(){
  if(SY.busy) return "Synchroniseren…";
  if(SY.error) return "<span class='vb-set-err'><b>Sync mislukt:</b> "+esc(SY.error)+". Controleer je token en verbinding en probeer opnieuw.</span>";
  var s = SY.lastSync ? "<b>Sync: aan.</b> Laatste sync: "+new Date(SY.lastSync).toLocaleString("nl-NL",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})+"." : "<b>Sync: aan.</b> Nog niet gesynchroniseerd.";
  if(SY.dirty) s+=" Er staan nog wijzigingen klaar.";
  return s;
}
function updateSyncUI(){
  var b=document.getElementById("vb-sync-btn"); if(b) b.classList[SY.busy?"add":"remove"]("vb-spin");
  var st=document.getElementById("vb-sync-status"); if(st) st.innerHTML=syncStatusHtml();
}

/* ===================== render ===================== */
/* keepScroll: bij een achtergrond-verversing (sync) blijft de scrollpositie staan */
function render(keepScroll){
  clear(ROOT);
  var body, cfg=SCREEN_CFG[S.screen];
  switch(S.screen){
    case "cooks": body=cookList(); break;
    case "rubs": body=rubList(); break;
    case "cook-form": body=cookForm(); break;
    case "rub-form": body=rubForm(); break;
    case "cook-detail": body=cookDetail(); break;
    case "rub-detail": body=rubDetail(); break;
    case "settings": body=settings(); break;
    case "stats": body=statsScreen(); break;
    default:
      if(cfg && S.screen===cfg.formScreen) body=simpleForm(cfg);
      else if(cfg && S.screen===cfg.detailScreen) body=simpleDetail(cfg);
      else if(cfg) body=simpleList(cfg);
      else body=cookList();
  }
  ROOT.appendChild(header());
  ROOT.appendChild(el("main",{class:"vb-main"+(isTabScreen()?" tabbed":"")}, body));
  if(isTabScreen()){
    ROOT.appendChild(fab());
    ROOT.appendChild(tabs());
    if(S.sheet) ROOT.appendChild(filterSheet());
  }
  if(!keepScroll) window.scrollTo(0,0);
}

applyTheme();
render();
if(SY.token) syncNow();
window.addEventListener("online",function(){ if(SY.token && SY.dirty) syncNow(); });
window.addEventListener("keydown",function(e){ if(e.key==="Escape" && S.sheet){ S.sheet=false; render(true); } });
})();
</script>
