<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1c1611">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Vuurboek">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<title>Vuurboek — Kamado Kooklogboek</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{overscroll-behavior:none;background:#f3eee3;
  --paper:#f3eee3;--panel:#eae3d4;--ink:#1f1a15;--muted:#6f6453;
  --line:#d9cfbb;--ember:#cf4718;--char:#1c1611;
  font-family:'Inter',system-ui,sans-serif;color:var(--ink);
  background:radial-gradient(120% 80% at 50% -10%,#f7f3ea 0%,#f3eee3 55%);
  min-height:100vh;-webkit-font-smoothing:antialiased;}
.vb-main{max-width:600px;margin:0 auto;padding:18px 16px 96px;}
.vb-top{position:sticky;top:0;z-index:10;background:var(--char);box-shadow:0 1px 0 #000,0 6px 20px rgba(0,0,0,.18);}
.vb-top-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:12px 14px;}
.vb-brand{flex:1;display:flex;flex-direction:column;line-height:1;}
.vb-brand-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.22em;font-size:20px;color:#f3ede0;}
.vb-brand-sub{font-family:'Barlow Condensed',sans-serif;font-weight:500;letter-spacing:.16em;text-transform:uppercase;font-size:10px;color:#b08458;margin-top:3px;}
.vb-brandmark{display:grid;place-items:center;width:34px;height:34px;border-radius:8px;background:linear-gradient(160deg,#cf4718,#8c2f10);color:#fff;flex:none;}
.vb-icon-btn{display:grid;place-items:center;width:38px;height:38px;border:none;background:rgba(255,255,255,.06);color:#f3ede0;border-radius:9px;cursor:pointer;flex:none;}
.vb-icon-btn:hover{background:rgba(255,255,255,.13);}
.vb-icon-btn:focus-visible,.vb-card:focus-visible,.vb-seg-btn:focus-visible,.vb-tab:focus-visible,
input:focus-visible,textarea:focus-visible,select:focus-visible,.vb-btn:focus-visible{outline:2px solid var(--ember);outline-offset:2px;}
.vb-muted{color:var(--muted);}.vb-center{text-align:center;padding:40px 0;}
svg{display:block;}
.vb-tabs{position:fixed;bottom:0;left:0;right:0;z-index:10;display:flex;background:var(--char);box-shadow:0 -2px 14px rgba(0,0,0,.2);padding-bottom:env(safe-area-inset-bottom);}
.vb-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;padding:11px 0 13px;color:#7c7064;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:11px;}
.vb-tab.on{color:var(--ember);}
.vb-banner{background:#fbf0ec;border:1px solid #e7c4b8;color:#8a3a22;border-radius:11px;padding:11px 13px;font-size:13px;line-height:1.45;margin-bottom:16px;}
.vb-banner b{font-weight:600;}
.vb-search{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:16px;color:var(--muted);}
.vb-search input{flex:1;border:none;background:none;font-size:15px;color:var(--ink);outline:none;}
.vb-clear{border:none;background:none;color:var(--muted);cursor:pointer;display:grid;place-items:center;padding:0;}
.vb-filters{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}
.vb-chip{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:7px 13px;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-size:12px;cursor:pointer;white-space:nowrap;}
.vb-chip.on{background:var(--ember);border-color:var(--ember);color:#fff;}
.vb-empty{text-align:center;padding:44px 20px;}
.vb-empty-flame{display:grid;place-items:center;width:64px;height:64px;margin:0 auto 18px;border-radius:50%;background:#fff;border:1px solid var(--line);color:var(--ember);}
.vb-empty h2{font-family:'Barlow Condensed',sans-serif;font-size:24px;letter-spacing:.04em;margin:0 0 8px;}
.vb-empty p{color:var(--muted);margin:0 auto 22px;max-width:340px;line-height:1.5;}
.vb-cards{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px;}
.vb-card{width:100%;display:flex;text-align:left;background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden;cursor:pointer;padding:0;box-shadow:0 1px 2px rgba(0,0,0,.04);transition:transform .08s,box-shadow .15s;}
.vb-card:hover,.vb-card:active{box-shadow:0 6px 18px rgba(60,40,20,.12);transform:translateY(-1px);}
.vb-card-heat{width:7px;flex:none;}
.vb-card-rub{padding-left:13px;align-items:center;gap:12px;}
.vb-rub-tag{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-size:10px;color:#fff;background:var(--char);border-radius:6px;padding:5px 8px;flex:none;}
.vb-rub-tag.big{padding:7px 11px;font-size:11px;background:var(--ember);}
.vb-card-body{flex:1;padding:13px 15px;min-width:0;}
.vb-card-rub .vb-card-body{padding-left:0;}
.vb-card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.vb-card-head h3{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:19px;letter-spacing:.02em;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vb-card-meat{color:var(--muted);font-size:13px;margin:2px 0 11px;}
.vb-card-rub .vb-card-meat{margin-bottom:0;}
.vb-card-stats{display:flex;gap:18px;}
.vb-stat{display:flex;flex-direction:column;gap:1px;}
.vb-stat-ic{color:var(--ember);}
.vb-stat-val{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;margin-top:2px;}
.vb-stat-lbl{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:9px;color:var(--muted);}
.vb-flames{display:flex;gap:3px;color:var(--ember);}
.vb-flame{border:none;background:none;padding:0;color:#cbbfa8;line-height:0;}
.vb-flame.on{color:var(--ember);}
.vb-form-title,.vb-detail-head h2{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;letter-spacing:.02em;margin:0 0 18px;}
.vb-field{display:flex;flex-direction:column;gap:7px;margin-bottom:15px;}
.vb-field-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.12em;font-size:11px;color:var(--muted);}
.vb-req{color:var(--ember);font-style:normal;margin-left:3px;}
.vb-field input,.vb-field textarea,.vb-field select{font-family:'Inter',sans-serif;font-size:15px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 12px;width:100%;outline:none;-webkit-appearance:none;appearance:none;}
.vb-field select{background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%236f6453' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:36px;}
.vb-field input::placeholder,.vb-field textarea::placeholder{color:#a89c87;}
.vb-field textarea{resize:vertical;line-height:1.5;}
.vb-row{display:flex;gap:12px;}.vb-row .vb-field{flex:1;}
.vb-group{display:flex;flex-direction:column;gap:7px;margin-bottom:15px;}
.vb-amt{display:flex;gap:8px;}
.vb-amt input{flex:1;font-family:'Inter',sans-serif;font-size:15px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 12px;outline:none;}
.vb-amt select{width:78px;flex:none;font-family:'Inter',sans-serif;font-size:15px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 26px 11px 12px;outline:none;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%236f6453' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-repeat:no-repeat;background-position:right 9px center;}
.vb-seg{display:flex;gap:6px;background:var(--panel);padding:4px;border-radius:11px;}
.vb-seg-btn{flex:1;border:none;background:none;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:13px;padding:8px 4px;border-radius:8px;color:var(--muted);cursor:pointer;}
.vb-seg-btn.is-on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12);}
.vb-heatbar{display:flex;align-items:center;gap:10px;margin:-4px 0 15px;}
.vb-heatbar-fill{flex:1;height:8px;border-radius:5px;}
.vb-heatbar-lbl{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:11px;color:var(--muted);}
.vb-hint{color:var(--ember);font-size:13px;margin:4px 0 0;}
.vb-hint.vb-soft{color:var(--muted);}
.vb-ings,.vb-fases{display:flex;flex-direction:column;gap:8px;}
.vb-ing-row{display:flex;gap:7px;align-items:center;}
.vb-ing-row input,.vb-ing-row select{font-family:'Inter',sans-serif;font-size:14px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 10px;color:var(--ink);outline:none;-webkit-appearance:none;appearance:none;}
.vb-ing-name{flex:1;min-width:0;}
.vb-ing-qty{width:58px;text-align:right;}
.vb-ing-unit{width:70px;flex:none;padding-right:22px !important;background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%236f6453' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-repeat:no-repeat;background-position:right 7px center;}
.vb-row-del{flex:none;width:32px;height:36px;display:grid;place-items:center;border:none;background:#f0e6d8;color:#9a3a26;border-radius:8px;cursor:pointer;padding:0;}
.vb-add-row{display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:none;border:1px dashed var(--line);color:var(--muted);border-radius:9px;padding:9px 12px;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.08em;font-size:12px;cursor:pointer;}
.vb-add-row:hover{border-color:var(--ember);color:var(--ember);}
.vb-fase{display:flex;flex-direction:column;gap:7px;background:var(--panel);border-radius:11px;padding:9px 10px;}
.vb-fase-top{display:flex;align-items:center;gap:7px;}
.vb-fase-no{flex:none;width:22px;height:22px;display:grid;place-items:center;border-radius:50%;background:var(--char);color:#f3ede0;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;}
.vb-fase-temp{display:flex;align-items:center;gap:4px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:0 8px;flex:none;}
.vb-fase-tag{font-size:11px;color:var(--muted);white-space:nowrap;}
.vb-fase-temp input{width:38px;border:none;background:none;font-size:14px;text-align:right;padding:9px 0;outline:none;color:var(--ink);}
.vb-fase-deg{font-size:11px;color:var(--muted);}
.vb-fase-top .vb-row-del{margin-left:auto;}
.vb-fase-desc{width:100%;font-family:'Inter',sans-serif;font-size:14px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 10px;color:var(--ink);outline:none;}
.vb-preview{margin:-4px 0 15px;background:var(--panel);border-radius:11px;padding:12px 14px;}
.vb-ing-meta{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:11px;color:var(--muted);margin:0 0 8px;}
.vb-ing-note{font-size:12px;color:var(--ember);margin:8px 0 0;}
.vb-ing-list-view{list-style:none;margin:0;padding:0;}
.vb-ing-list-view li{display:flex;justify-content:space-between;gap:14px;padding:7px 0;border-bottom:1px dotted var(--line);}
.vb-ing-list-view li:last-child{border-bottom:none;}
.vb-ing-amt{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;white-space:nowrap;}
.vb-btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:14px;padding:12px 18px;border-radius:10px;border:1px solid transparent;cursor:pointer;}
.vb-btn-primary{background:var(--ember);color:#fff;}
.vb-btn-primary:hover{background:#b83d12;}
.vb-btn-primary:disabled{background:#d8b9a6;cursor:not-allowed;}
.vb-btn-ghost{background:#fff;border-color:var(--line);color:var(--ink);}
.vb-btn-ghost:hover{background:var(--panel);}
.vb-btn-danger{background:#a32814;color:#fff;}
.vb-btn-block{width:100%;margin-bottom:11px;}
.vb-form-actions,.vb-detail-actions{display:flex;gap:11px;margin-top:24px;}
.vb-form-actions .vb-btn,.vb-detail-actions .vb-btn{flex:1;}
.vb-detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;}
.vb-detail-meat{color:var(--muted);margin:-12px 0 0;font-size:15px;}
.vb-detail-date{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;margin:10px 0 18px;}
.vb-gauges{display:flex;gap:12px;margin-bottom:22px;}
.vb-gauge{flex:1;background:#fff;border:1px solid var(--line);border-radius:13px;padding:15px 16px;display:flex;flex-direction:column;gap:4px;}
.vb-gauge-lbl{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.12em;font-size:11px;color:var(--muted);}
.vb-gauge-val{font-family:'Space Mono',monospace;font-weight:700;font-size:34px;line-height:1;}
.vb-gauge-val i{font-size:15px;font-style:normal;margin-left:2px;color:var(--muted);}
.vb-gauge-sub{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:10px;color:var(--muted);}
.vb-block{margin:0 0 18px;}
.vb-block-title{display:flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.12em;font-size:12px;color:var(--ember);margin:0 0 8px;}
.vb-block p{margin:0;line-height:1.55;}
.vb-notes{white-space:pre-wrap;}
.vb-fase-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}
.vb-fase-list li{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
.vb-fase-list-no{flex:none;width:22px;height:22px;display:grid;place-items:center;border-radius:50%;background:var(--char);color:#f3ede0;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;}
.vb-fase-list-temp{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;}
.vb-fase-list-pit{font-family:'Space Mono',monospace;font-weight:700;font-size:11px;color:#fff;border-radius:6px;padding:3px 7px;white-space:nowrap;}
.vb-fase-list-desc{color:var(--muted);font-size:14px;}
.vb-calc{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--muted);margin-bottom:10px;}
.vb-calc input{width:70px;font-family:'Inter',sans-serif;font-size:15px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 10px;outline:none;text-align:right;}
.vb-specs{margin:0 0 6px;border-top:1px solid var(--line);}
.vb-spec{display:flex;justify-content:space-between;gap:16px;padding:11px 0;border-bottom:1px solid var(--line);}
.vb-spec dt{display:flex;align-items:center;gap:8px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:13px;}
.vb-spec dd{margin:0;font-weight:500;text-align:right;}
.vb-coal{width:13px;height:13px;border-radius:3px;display:inline-block;background:linear-gradient(135deg,#3a322a,#15110d);}
.vb-del-link{display:flex;align-items:center;gap:7px;margin:22px auto 0;background:none;border:none;color:#9a3a26;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;}
.vb-del-confirm{margin-top:22px;background:#fbf0ec;border:1px solid #e7c4b8;border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.vb-del-confirm span{font-size:14px;}
.vb-del-confirm>div{display:flex;gap:9px;}
.vb-del-confirm .vb-btn{padding:9px 14px;font-size:13px;}
.vb-set-status{background:#fff;border:1px solid var(--line);border-radius:11px;padding:13px 15px;font-size:13px;line-height:1.5;color:var(--muted);margin-bottom:18px;}
.vb-set-status b{color:var(--ink);}
.vb-set-note{font-size:12px;color:var(--muted);line-height:1.5;margin-top:14px;}
.vb-spin svg{animation:vbspin 1s linear infinite;}
@keyframes vbspin{to{transform:rotate(360deg);}}
.vb-sync-field{display:flex;gap:8px;margin:10px 0 12px;}
.vb-sync-field input{flex:1;min-width:0;font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 12px;outline:none;}
@media (prefers-reduced-motion:reduce){.vb-card{transition:none;}}
@media (max-width:380px){.vb-card-stats{gap:12px;}.vb-gauge-val{font-size:28px;}.vb-fase-desc{font-size:13px;}}
</style>
</head>

var HEAT_STOPS=[[90,[62,110,142]],[130,[78,138,107]],[180,[224,147,26]],[250,[216,99,26]],[350,[192,46,18]]];
function rgb(a){return "rgb("+a[0]+","+a[1]+","+a[2]+")";}
function heatColor(t){ var v=Number(t); if(!v||isNaN(v)) return "#9a8c78";
  if(v<=HEAT_STOPS[0][0]) return rgb(HEAT_STOPS[0][1]);
  if(v>=HEAT_STOPS[4][0]) return rgb(HEAT_STOPS[4][1]);
  for(var i=0;i<4;i++){ var t0=HEAT_STOPS[i][0],c0=HEAT_STOPS[i][1],t1=HEAT_STOPS[i+1][0],c1=HEAT_STOPS[i+1][1];
    if(v>=t0&&v<=t1){ var f=(v-t0)/(t1-t0); return rgb([Math.round(c0[0]+(c1[0]-c0[0])*f),Math.round(c0[1]+(c1[1]-c0[1])*f),Math.round(c0[2]+(c1[2]-c0[2])*f)]); } }
  return "#9a8c78";
}
function heatLabel(t){ var v=Number(t); if(!v||isNaN(v)) return ""; if(v<130) return "Low & slow"; if(v<200) return "Indirect garen"; if(v<270) return "Grillen"; return "Searen / pizza"; }

function fmtAmount(v){ if(v==null||isNaN(v)) return ""; var r; if(v>=10) r=Math.round(v); else if(v>=1) r=Math.round(v*10)/10; else r=Math.round(v*100)/100; return r.toLocaleString("nl-NL",{maximumFractionDigits:2}); }
function formatDate(iso){ try{ return new Date(iso+"T00:00:00").toLocaleDateString("nl-NL",{day:"numeric",month:"long",year:"numeric"}); }catch(e){ return iso; } }
function finalKern(fases){ var f=(fases||[]).filter(function(p){return p.temp;}); return f.length? Number(f[f.length-1].temp) : null; }
function effPit(r){ if(r.pitTemp) return r.pitTemp; var f=(r.kernFases||[]).filter(function(p){return p.pit;})[0]; return f? f.pit : ""; }

function migrateRecipe(r){ var m=Object.assign({},r);
  if(typeof m.gewicht==="string"){ var s=m.gewicht.toLowerCase(); var num=parseFloat(s.replace(",",".").replace(/[^0-9.]/g,"")); m.gewicht=isNaN(num)?"":num; m.gewichtEenheid=/(^|[^k])g(ram)?\b/.test(s)?"g":"kg"; }
  if(m.gewichtEenheid==null) m.gewichtEenheid="kg";
  if(!Array.isArray(m.kernFases)){ m.kernFases = m.kernTemp ? [{id:uid(),temp:Number(m.kernTemp),pit:"",beschrijving:""}] : []; }
  m.kernFases = m.kernFases.map(function(p){ return Object.assign({pit:""}, p); });
  if(m.rubRef==null) m.rubRef = m.rubMarinade ? "__custom__" : "";
  if(m.beoordeling==null) m.beoordeling=0;
  if(m.updatedAt==null) m.updatedAt=m.createdAt||0;
  return m;
}

function cookList(){
  var wrap=el("div");
  if(!storageOK) wrap.appendChild(el("div",{class:"vb-banner",html:"<b>Let op:</b> automatisch opslaan werkt niet als je dit bestand rechtstreeks opent. Gebruik het tandwiel ▸ <b>Exporteer</b> om je gegevens te bewaren. Zie het bericht voor de beste manier om de app te openen."}));
  var results=el("div");
  function draw(){
    clear(results);
    var q=S.query.trim().toLowerCase();
    var list = S.recepten.filter(function(r){
      if(S.catFilter && r.soortVlees!==S.catFilter) return false;
      if(q && [r.naam,r.soortVlees,r.houtskool,r.rookhout].filter(Boolean).join(" ").toLowerCase().indexOf(q)===-1) return false;
      return true;
    });
    if(S.recepten.length===0){ results.appendChild(emptyState("flame","Nog geen cooks gelogd","Leg je eerste vuur vast — vlees, rub, temperatuur en hoe het uitpakte.","Eerste cook toevoegen",headerAdd)); return; }
    if(list.length===0){ results.appendChild(el("p",{class:"vb-muted vb-center"}, q ? 'Niets gevonden voor "'+S.query+'".' : "Geen cooks in deze categorie.")); return; }
    var ul=el("ul",{class:"vb-cards"});
    list.forEach(function(r){ var fk=finalKern(r.kernFases); var ep=effPit(r);
      var card=el("button",{class:"vb-card",onClick:function(){ S.selCook=r.id; S.screen="cook-detail"; render(); }});
      card.appendChild(el("span",{class:"vb-card-heat",style:{background:heatColor(ep)}}));
      var body=el("div",{class:"vb-card-body"});
      body.appendChild(el("div",{class:"vb-card-head"}, el("h3",{},r.naam), flames(r.beoordeling,false,true)));
      body.appendChild(el("p",{class:"vb-card-meat"}, r.soortVlees + (r.gewicht? " · "+fmtAmount(r.gewicht)+" "+r.gewichtEenheid : "")));
      body.appendChild(el("div",{class:"vb-card-stats"}, stat("thermometer", ep?ep+"°":"—","pit"), stat("flame", fk?fk+"°":"—","kern"), stat("clock", r.gaartijd||"—","gaartijd")));
      card.appendChild(body); ul.appendChild(el("li",{},card));
    });
    results.appendChild(ul);
  }
  function distinctCats(){

    order.sort(function(a,b){ var ia=CATEGORIEEN.indexOf(a), ib=CATEGORIEEN.indexOf(b); if(ia===-1&&ib===-1) return a.localeCompare(b); if(ia===-1) return 1; if(ib===-1) return -1; return ia-ib; });

  }

  }

}

function doExport(){
  var data={ app:"vuurboek", version:1, exported:new Date().toISOString(), recepten:S.recepten, rubs:S.rubs };
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a"); a.href=url; a.download="vuurboek-backup-"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(function(){ URL.revokeObjectURL(url); },1000);
}
function pickJson(onData){
  var inp=document.createElement("input"); inp.type="file"; inp.accept=".json,application/json";
  inp.addEventListener("change",function(){ var f=inp.files[0]; if(!f) return; var rd=new FileReader();
    rd.onload=function(){ try{ var data=JSON.parse(rd.result);
      var rec=Array.isArray(data.recepten)?data.recepten:[]; var rb=Array.isArray(data.rubs)?data.rubs:[];
      onData(rec, rb);
    }catch(e){ alert("Kon het bestand niet lezen. Is het een Vuurboek-bestand (.json)?"); } };
    rd.readAsText(f);
  });
  inp.click();
}
function doImport(){
  pickJson(function(rec, rb){
    if(!confirm("Hiermee vervang je je huidige gegevens door "+rec.length+" cooks en "+rb.length+" rubs uit het bestand. Doorgaan?")) return;
    var now=Date.now(), incoming={};
    rec.concat(rb).forEach(function(r){ if(r&&r.id) incoming[r.id]=1; });
    S.recepten.concat(S.rubs).forEach(function(r){ if(r.id && !incoming[r.id]) TOMB[r.id]=now; });
    S.recepten=rec.map(function(r){ var m=migrateRecipe(r); if(!m.id) m.id=uid(); if(!m.updatedAt) m.updatedAt=now; return m; }).sort(byDate);
    S.rubs=rb.map(function(r){ var m=Object.assign({},r); if(!m.id) m.id=uid(); if(!m.updatedAt) m.updatedAt=now; return m; }).sort(byName);
    persistTomb(); saveRecepten(); saveRubs(); touch();
    alert("Geïmporteerd: "+rec.length+" cooks en "+rb.length+" rubs."); render();
  });
}
function doImportMerge(){
  pickJson(function(rec, rb){
    if(rec.length===0 && rb.length===0){ alert("Geen cooks of rubs gevonden in dit bestand."); return; }
    var haveR={}, haveB={};
    S.recepten.forEach(function(r){ if(r.id) haveR[r.id]=1; });
    S.rubs.forEach(function(r){ if(r.id) haveB[r.id]=1; });
    var addedR=0, addedB=0, skipped=0;
    rec.forEach(function(r){
      if(r.id && haveR[r.id]){ skipped++; return; }
      var m=migrateRecipe(r); if(!m.id) m.id=uid(); m.updatedAt=Date.now(); haveR[m.id]=1;
      S.recepten.push(m); addedR++;
    });
    rb.forEach(function(r){
      if(r.id && haveB[r.id]){ skipped++; return; }
      var m=Object.assign({},r); if(!m.id) m.id=uid(); m.updatedAt=Date.now(); haveB[m.id]=1;
      S.rubs.push(m); addedB++;
    });
    if(addedR) saveRecepten();
    if(addedB) saveRubs();
    if(addedR||addedB) touch();
    alert("Toegevoegd: "+addedR+" cooks en "+addedB+" rubs."+(skipped? " "+skipped+" overgeslagen (stonden er al in).":""));
    render();
  });
}

/* ===================== sync (GitHub Gist) ===================== */
var GIST_FILE="vuurboek-data.json";
var syncTimer=null;
function scheduleSync(){ if(!SY.token) return; if(syncTimer) clearTimeout(syncTimer); syncTimer=setTimeout(function(){ syncTimer=null; syncNow(); },3000); }
function touch(){ SY.dirty=true; persistSync(); scheduleSync(); }
function gh(method, path, body){
  return fetch("https://api.github.com"+path,{method:method,headers:{"Authorization":"Bearer "+SY.token,"Accept":"application/vnd.github+json"},body:body?JSON.stringify(body):undefined})
    .then(function(res){
      if(res.status===401||res.status===403) throw new Error("token geweigerd of verlopen");
      if(res.status===404) throw new Error("gist niet gevonden");
      if(!res.ok) throw new Error("GitHub-fout "+res.status);
      return res.json();
    });
}
function syncPayload(){ return JSON.stringify({app:"vuurboek",version:2,updated:new Date().toISOString(),recepten:S.recepten,rubs:S.rubs,deleted:TOMB},null,1); }
function ensureGist(){
  if(SY.gistId) return Promise.resolve();
  return gh("GET","/gists?per_page=100").then(function(list){
    var found=(list||[]).filter(function(g){ return g.files && g.files[GIST_FILE]; })[0];
    if(found){ SY.gistId=found.id; persistSync(); return; }
    var files={}; files[GIST_FILE]={content:syncPayload()};
    return gh("POST","/gists",{description:"Vuurboek — kamado kooklogboek (data)",public:false,files:files}).then(function(g){ SY.gistId=g.id; persistSync(); });
  });
}
function pullRemote(){
  return gh("GET","/gists/"+SY.gistId).then(function(g){
    var f=g.files && g.files[GIST_FILE]; if(!f) return null;
    if(f.truncated) return fetch(f.raw_url).then(function(r){ return r.json(); });
    try{ return JSON.parse(f.content); }catch(e){ return null; }
  });
}
function mergeTombs(remote){ if(!remote) return; Object.keys(remote).forEach(function(id){ if(!TOMB[id]||remote[id]>TOMB[id]) TOMB[id]=remote[id]; }); }
function mergeLists(local, remote){
  var map={};
  function put(it){ if(!it||!it.id) return; var ex=map[it.id]; if(!ex||(it.updatedAt||0)>(ex.updatedAt||0)) map[it.id]=it; }
  local.forEach(put); (remote||[]).forEach(put);
  return Object.keys(map).map(function(id){ return map[id]; }).filter(function(it){ return !(TOMB[it.id] && TOMB[it.id]>=(it.updatedAt||0)); });
}
function syncNow(manual){
  if(!SY.token) return;
  if(!navigator.onLine){ if(manual) alert("Geen internetverbinding — synchroniseren lukt zodra je weer online bent."); return; }
  if(SY.busy){ SY.queued=true; return; }
  SY.busy=true; SY.error=""; updateSyncUI();
  var before=JSON.stringify([S.recepten,S.rubs]), remoteStr="";
  ensureGist().then(pullRemote).then(function(remote){
    if(remote){
      remoteStr=JSON.stringify({r:remote.recepten||[],b:remote.rubs||[],d:remote.deleted||{}});
      mergeTombs(remote.deleted);
      S.recepten=mergeLists(S.recepten,(remote.recepten||[]).map(migrateRecipe)).sort(byDate);
      S.rubs=mergeLists(S.rubs,remote.rubs||[]).sort(byName);
      persist(KEY_RECEPTEN,S.recepten); persist(KEY_RUBS,S.rubs); persistTomb();
    }
    if(SY.dirty || JSON.stringify({r:S.recepten,b:S.rubs,d:TOMB})!==remoteStr){
      var files={}; files[GIST_FILE]={content:syncPayload()};
      return gh("PATCH","/gists/"+SY.gistId,{files:files});
    }
  }).then(function(){ SY.dirty=false; SY.lastSync=Date.now(); })
  .catch(function(e){ SY.error=(e&&e.message)?e.message:"onbekende fout"; })
  .then(function(){
    SY.busy=false; persistSync();
    if(SY.queued){ SY.queued=false; updateSyncUI(); syncNow(); return; }
    var changed=JSON.stringify([S.recepten,S.rubs])!==before;
    if(changed && ["cooks","rubs","cook-detail","rub-detail","settings"].indexOf(S.screen)>-1) render();
    else updateSyncUI();
  });
}
function syncStatusHtml(){
  if(SY.busy) return "Synchroniseren…";
  if(SY.error) return "<b>Sync mislukt:</b> "+SY.error+". Controleer je token en verbinding en probeer opnieuw.";
  var s = SY.lastSync ? "<b>Sync: aan.</b> Laatste sync: "+new Date(SY.lastSync).toLocaleString("nl-NL",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})+"." : "<b>Sync: aan.</b> Nog niet gesynchroniseerd.";
  if(SY.dirty) s+=" Er staan nog wijzigingen klaar.";
  return s;
}
function updateSyncUI(){
  var b=document.getElementById("vb-sync-btn"); if(b) b.classList[SY.busy?"add":"remove"]("vb-spin");
  var st=document.getElementById("vb-sync-status"); if(st) st.innerHTML=syncStatusHtml();
}

/* ===================== render ===================== */
function render(){
  clear(ROOT);
  var body;
  switch(S.screen){
    case "cooks": body=cookList(); break;
    case "rubs": body=rubList(); break;
    case "cook-form": body=cookForm(); break;
    case "rub-form": body=rubForm(); break;
    case "cook-detail": body=cookDetail(); break;
    case "rub-detail": body=rubDetail(); break;
    case "settings": body=settings(); break;
    default: body=cookList();
  }
  ROOT.appendChild(header());
  ROOT.appendChild(el("main",{class:"vb-main"}, body));
  ROOT.appendChild(tabs());
  window.scrollTo(0,0);
}

render();
if(SY.token) syncNow();
window.addEventListener("online",function(){ if(SY.token && SY.dirty) syncNow(); });
})();
</script>
